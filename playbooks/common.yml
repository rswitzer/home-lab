---
# Base OS setup applied to all hosts
- name: Common setup for all Pis
  hosts: all
  become: true
  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: dist

    - name: Ensure passwordless sudo for ansible user
      ansible.builtin.copy:
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/90-{{ ansible_user }}"
        owner: root
        group: root
        mode: '0440'
        validate: 'visudo -cf %s'
