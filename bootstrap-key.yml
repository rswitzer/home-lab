---
# One-shot playbook to install the operator's public SSH key on all hosts
# Usage: ansible-playbook -i inventory.ini bootstrap-key.yml --ask-pass
- name: Bootstrap SSH public key to remote users
  hosts: all
  gather_facts: false
  vars:
    pubkey_path: "~/.ssh/id_ed25519.pub"
    target_user: "{{ ansible_user | default('rachel') }}"
  pre_tasks:
    - name: Wait for SSH/Ansible connection
      ansible.builtin.wait_for_connection:
        timeout: 180
        sleep: 2
  tasks:
    - name: Ensure remote .ssh directory exists
      file:
        path: "~/.ssh"
        state: directory
        mode: '0700'

    - name: Install public key for target user
      authorized_key:
        user: "{{ target_user }}"
        state: present
        key: "{{ lookup('file', pubkey_path) }}"

    - name: Ensure authorized_keys has correct permissions
      file:
        path: "~/.ssh/authorized_keys"
        mode: '0600'
